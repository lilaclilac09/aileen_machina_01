<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="/dj-set/" />
  <title>Aileena — DJ Set</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Barlow+Condensed:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050608;
      --cyan: #63f3d8;
      --cyan-dim: rgba(99, 243, 216, 0.35);
      --text: #edf2f7;
      --muted: #7f90a1;
      --panel: #11161c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow Condensed', system-ui, sans-serif;
      overflow-x: hidden;
    }
    .wash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 50% at 50% 20%, rgba(99,243,216,0.08), transparent 55%);
    }
    header {
      position: relative;
      z-index: 2;
      padding: 2rem 1.5rem 1rem;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
    }
    h1 {
      font-weight: 300;
      letter-spacing: 0.35em;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      text-transform: uppercase;
    }
    .genre {
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 28rem;
      line-height: 1.5;
      margin-top: 0.5rem;
    }
    .toolbar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .toolbar button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 0.85rem;
      border: 1px solid rgba(99,243,216,0.25);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .toolbar button.active {
      color: var(--cyan);
      border-color: var(--cyan-dim);
      box-shadow: 0 0 20px rgba(99,243,216,0.12);
    }
    main {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1.5rem 4rem;
    }
    /* Carousel */
    .carousel-wrap {
      position: relative;
      margin-top: 1.5rem;
    }
    .carousel {
      display: flex;
      gap: 1.25rem;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 1.5rem 0 2rem;
      scrollbar-width: thin;
      scrollbar-color: var(--cyan-dim) transparent;
    }
    .carousel::-webkit-scrollbar { height: 6px; }
    .carousel::-webkit-scrollbar-thumb { background: var(--cyan-dim); border-radius: 3px; }
    .card {
      flex: 0 0 min(78vw, 320px);
      scroll-snap-align: center;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      padding: 1.25rem;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    }
    .card:hover, .card.focused {
      transform: translateY(-4px);
      border-color: var(--cyan-dim);
      box-shadow: 0 0 40px rgba(99,243,216,0.15), inset 0 0 60px rgba(99,243,216,0.03);
    }
    .card .track-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--cyan);
      margin-bottom: 0.75rem;
    }
    .cover {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 2px;
      object-fit: cover;
      margin-bottom: 1rem;
      box-shadow: 0 0 24px rgba(99,243,216,0.1);
    }
    .card h2 {
      font-weight: 400;
      font-size: 1.35rem;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
    }
    .card .artist {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .meta span b { color: var(--text); font-weight: 500; }
    /* List view */
    .list { display: none; flex-direction: column; gap: 0.5rem; margin-top: 1.5rem; }
    .list.active { display: flex; }
    .carousel-wrap.grid-off .carousel { display: none; }
    .list-row {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 1rem;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .list-row:hover, .list-row.focused {
      border-color: var(--cyan-dim);
    }
    .list-row img { width: 72px; height: 72px; object-fit: cover; }
    .list-row .lid {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--cyan);
      letter-spacing: 0.15em;
    }
    .detail {
      margin-top: 2rem;
      padding: 1.5rem;
      border: 1px solid rgba(99,243,216,0.2);
      background: rgba(17,22,28,0.9);
      min-height: 120px;
    }
    .detail .lid {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--cyan);
      letter-spacing: 0.25em;
      margin-bottom: 0.5rem;
    }
    .detail h3 { font-weight: 300; font-size: 1.75rem; letter-spacing: 0.08em; }
    .detail .sub { color: var(--muted); margin: 0.35rem 0 1rem; }
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: rgba(127,144,161,0.5);
      text-transform: uppercase;
    }
    footer a { color: var(--cyan-dim); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wash" aria-hidden="true"></div>
  <header>
    <div>
      <h1>Aileena Machina</h1>
      <p class="genre" id="genre"></p>
    </div>
    <div class="toolbar">
      <button type="button" id="btn-carousel" class="active">Carousel</button>
      <button type="button" id="btn-list">List</button>
    </div>
  </header>
  <main>
    <div class="carousel-wrap" id="wrap">
      <div class="carousel" id="carousel"></div>
      <div class="list" id="list"></div>
    </div>
    <div class="detail" id="detail">
      <p class="lid">SELECT A TRACK</p>
      <h3>—</h3>
      <p class="sub">Tap a card to load metadata</p>
    </div>
  </main>
  <footer>
    <a href="https://aileena.xyz/sound">Full deck → aileena.xyz/sound</a>
  </footer>
  <script>
    const fmtTime = (sec) => {
      if (sec == null || !Number.isFinite(sec)) return '—:—';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${String(s).padStart(2, '0')}`;
    };
    const fmtMeta = (t) => {
      const parts = [];
      if (t.bpm) parts.push(`<span>BPM <b>${t.bpm}</b></span>`);
      if (t.key) parts.push(`<span>KEY <b>${t.key}</b></span>`);
      parts.push(`<span>TIME <b>${fmtTime(t.durationSec)}</b></span>`);
      return parts.join('');
    };
    let tracks = [];
    let focused = 0;
    const detail = document.getElementById('detail');
    const carousel = document.getElementById('carousel');
    const list = document.getElementById('list');
    const wrap = document.getElementById('wrap');

    function showDetail(i) {
      focused = i;
      const t = tracks[i];
      if (!t) return;
      document.querySelectorAll('.card, .list-row').forEach((el, idx) => {
        el.classList.toggle('focused', idx === i);
      });
      detail.innerHTML = `
        <p class="lid">TRACK ${t.id}</p>
        <h3>${t.title}</h3>
        <p class="sub">${t.artist}${t.album ? ' · ' + t.album : ''}</p>
        <div class="meta">${fmtMeta(t)}</div>
        ${t.note ? `<p class="sub" style="margin-top:1rem">${t.note}</p>` : ''}
      `;
    }

    function renderCards() {
      carousel.innerHTML = tracks.map((t, i) => `
        <article class="card" data-i="${i}" tabindex="0">
          <div class="track-id">TRACK ${t.id}</div>
          <img class="cover" src="${t.cover}" alt="" loading="lazy" />
          <h2>${t.title}</h2>
          <p class="artist">${t.artist}</p>
          <div class="meta">${fmtMeta(t)}</div>
        </article>
      `).join('');
      list.innerHTML = tracks.map((t, i) => `
        <div class="list-row" data-i="${i}">
          <img src="${t.cover}" alt="" />
          <div>
            <div class="lid">TRACK ${t.id}</div>
            <strong>${t.title}</strong><br />
            <span style="color:var(--muted);font-size:0.9rem">${t.artist}</span>
          </div>
          <div class="meta">${fmtMeta(t)}</div>
        </div>
      `).join('');
      document.querySelectorAll('.card, .list-row').forEach((el) => {
        el.addEventListener('click', () => showDetail(Number(el.dataset.i)));
      });
      showDetail(0);
    }

    document.getElementById('btn-carousel').addEventListener('click', () => {
      wrap.classList.remove('grid-off');
      document.getElementById('btn-carousel').classList.add('active');
      document.getElementById('btn-list').classList.remove('active');
      list.classList.remove('active');
    });
    document.getElementById('btn-list').addEventListener('click', () => {
      wrap.classList.add('grid-off');
      document.getElementById('btn-list').classList.add('active');
      document.getElementById('btn-carousel').classList.remove('active');
      list.classList.add('active');
    });

    fetch('/dj-set/setlist.json')
      .then((r) => r.json())
      .then((data) => {
        document.getElementById('genre').textContent = data.genre || '';
        tracks = data.tracks || [];
        renderCards();
      })
      .catch(() => {
        detail.innerHTML = '<p class="sub">Failed to load setlist.json</p>';
      });
  </script>
</body>
</html>
