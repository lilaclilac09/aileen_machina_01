<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPACE AILEENA - Subdomains Hub</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #ddd;
      min-height: 100vh;
    }

    .sub-nav {
      background: #111;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 16px 0;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: #444 #111;
    }

    .sub-nav::-webkit-scrollbar {
      height: 6px;
    }
    .sub-nav::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 3px;
    }
    .sub-nav::-webkit-scrollbar-track {
      background: #111;
    }

    .sub-nav ul {
      display: flex;
      list-style: none;
      gap: 12px;
      margin: 0;
      padding: 0 24px;
    }

    .sub-nav a {
      display: inline-flex;
      align-items: center;
      padding: 10px 20px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      text-decoration: none;
      color: #ccc;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .sub-nav a:hover {
      background: #222;
      color: #fff;
      border-color: #555;
      box-shadow: 0 0 12px rgba(0, 170, 255, 0.3);
      transform: translateY(-2px);
    }

    .sub-nav a.active {
      background: #004466;
      border-color: #00aaff;
      color: #fff;
    }

    .sub-nav a::before {
      content: "⚙︎ ";
      font-size: 14px;
      margin-right: 6px;
      opacity: 0.7;
    }

    .content {
      padding: 80px 20px;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #eee;
    }
    p {
      font-size: 1.2rem;
      color: #aaa;
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <nav class="sub-nav">
    <ul>
      <li><a href="https://aileena.xyz" class="active">Main Studio</a></li>
      <li><a href="https://space.aileena.xyz">Space Hub</a></li>
      <li><a href="https://blog.aileena.xyz">Blog</a></li>
      <li><a href="https://gallery.aileena.xyz">Gallery</a></li>
      <li><a href="https://sound.aileena.xyz">Sound</a></li>
      <li><a href="https://shop.aileena.xyz">Shop / Vinyl</a></li>
      <li><a href="https://events.aileena.xyz">Events</a></li>
      <li><a href="https://api.aileena.xyz">API</a></li>
    </ul>
  </nav>

  <div class="content">
    <h1>SPACE AILEENA</h1>
    <p>机械美学的扩展空间。滑动上方导航探索所有子站点。<br>⚙︎ Poetry in Motion ⚙︎</p>
  </div>

</body>
</html>
