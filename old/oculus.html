<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Oculus portal with breathing light and rose rain animation.">
  <title>OCULUS | Pioggia delle rose</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --ink: #ffffff;
      --neon: #00f9ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: "Barlow Condensed", "Oswald", "Inter", sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .title {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(1.1rem, 3vw, 2.2rem);
      letter-spacing: 0.42em;
      opacity: 0.74;
      pointer-events: none;
      text-shadow: 0 0 40px var(--neon);
      white-space: nowrap;
      text-transform: uppercase;
      text-align: center;
      padding: 0 14px;
    }

    .back {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--neon);
      text-decoration: none;
      font-size: clamp(0.8rem, 2.6vw, 1.05rem);
      letter-spacing: 0.24em;
      border: 1px solid rgba(0, 249, 255, 0.35);
      border-radius: 999px;
      padding: 10px 18px;
      backdrop-filter: blur(4px);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      text-transform: uppercase;
    }

    .back:hover {
      transform: translateX(-50%) scale(1.04);
      border-color: rgba(0, 249, 255, 0.9);
      box-shadow: 0 0 24px rgba(0, 249, 255, 0.45);
    }

    @media (max-width: 768px) {
      .title {
        top: 20px;
        letter-spacing: 0.2em;
      }

      .back {
        bottom: 20px;
        padding: 10px 14px;
        letter-spacing: 0.14em;
      }
    }
  </style>
</head>
<body>
  <canvas id="c" aria-label="Oculus breathing rose rain"></canvas>
  <div class="title">OCULUS | PENTECOST</div>
  <a href="index.html" class="back">Back to Machina</a>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    let w = 0;
    let h = 0;
    const particles = [];

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    class Petal {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = w / 2 + (Math.random() - 0.5) * 280;
        this.y = h * 0.22;
        this.size = Math.random() * 18 + 14;
        this.speed = Math.random() * 1.2 + 0.8;
        this.angle = Math.random() * Math.PI * 2;
        this.angleSpeed = (Math.random() - 0.5) * 0.08;
        this.sway = Math.random() * 0.8 + 0.4;
        this.opacity = Math.random() * 0.4 + 0.6;
      }

      update(breath) {
        this.y += this.speed + breath * 0.6;
        this.x += Math.sin(this.angle) * this.sway;
        this.angle += this.angleSpeed;

        if (this.y > h + 50) {
          this.reset();
        }
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.font = `${this.size}px Arial`;
        ctx.globalAlpha = this.opacity;
        ctx.fillText("🌹", -this.size / 2, this.size / 2);
        ctx.restore();
      }
    }

    function initPetals(count) {
      particles.length = 0;
      for (let i = 0; i < count; i += 1) {
        particles.push(new Petal());
      }
    }

    resize();
    initPetals(65);
    window.addEventListener("resize", resize);

    let time = 0;
    function animate() {
      time += 0.016;
      const breath = Math.sin(time * 0.6) * 0.5 + 0.5;

      ctx.fillStyle = "rgba(10, 10, 10, 0.12)";
      ctx.fillRect(0, 0, w, h);

      const grad = ctx.createRadialGradient(w / 2, h * 0.22, 80, w / 2, h * 0.22, 420);
      grad.addColorStop(0, `rgba(0, 249, 255, ${0.25 + breath * 0.25})`);
      grad.addColorStop(1, "transparent");
      ctx.fillStyle = grad;
      ctx.fillRect(0, h * 0.18, w, h * 0.9);

      ctx.save();
      ctx.shadowBlur = 80 + breath * 40;
      ctx.shadowColor = "#00f9ff";
      ctx.strokeStyle = "#00f9ff";
      ctx.lineWidth = 18;
      ctx.beginPath();
      ctx.arc(w / 2, h * 0.22, 140 + breath * 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      for (const petal of particles) {
        petal.update(breath);
        petal.draw();
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
