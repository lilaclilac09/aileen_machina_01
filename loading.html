<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aileen Machina 01 • Loading</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500;600&display=swap');

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at 50% 30%, #2a1a00 0%, #0a0500 80%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', system-ui, sans-serif;
      color: #ffcc99;
    }

    .loading-container {
      position: relative;
      width: 420px;
      height: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .orb {
      position: relative;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle at 36% 28%, rgba(255, 245, 190, 0.98), rgba(255, 155, 30, 0.94) 38%, rgba(255, 85, 15, 0.82) 65%, rgba(200, 45, 0, 0.55) 85%);
      border-radius: 50%;
      box-shadow: 
        0 0 110px rgba(255, 170, 40, 0.98),
        0 0 220px rgba(255, 115, 25, 0.75),
        0 0 340px rgba(255, 70, 15, 0.45),
        inset 0 0 80px rgba(255, 255, 230, 0.6),
        inset -45px -45px 90px rgba(255, 195, 90, 0.4);
      animation: breath 4.6s infinite ease-in-out, slowRotate 36s linear infinite;
      backdrop-filter: blur(18px);
      border: 2.5px solid rgba(255, 230, 160, 0.45);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .orb::before {
      content: '';
      position: absolute;
      top: 16%;
      left: 20%;
      width: 58%;
      height: 58%;
      background: radial-gradient(circle, rgba(255,255,255,0.78) 12%, transparent 68%);
      border-radius: 50%;
      animation: highlight 6.8s infinite alternate ease-in-out;
    }

    @keyframes breath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.085); }
    }

    @keyframes slowRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes highlight {
      0% { transform: scale(1) translate(0, 0); opacity: 0.75; }
      100% { transform: scale(1.22) translate(14px, -16px); opacity: 0.96; }
    }

    .brand {
      margin-top: 42px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.1rem;
      font-weight: 600;
      letter-spacing: 6px;
      text-shadow: 0 0 25px #ff8800;
    }

    .status {
      margin-top: 18px;
      font-size: 1.05rem;
      opacity: 0.75;
      letter-spacing: 3px;
      animation: fadeStatus 3s infinite alternate;
    }

    @keyframes fadeStatus {
      from { opacity: 0.6; }
      to { opacity: 0.95; }
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="orb" id="orb"></div>
    <div class="brand">AILEEN</div>
    <div class="status">MACHINA 01 • 唤醒中…</div>
  </div>

  <script>
    // 加载完成自动淡出（模拟真实加载）
    setTimeout(() => {
      document.body.style.transition = 'opacity 1.2s ease';
      document.body.style.opacity = '0';
      setTimeout(() => {
        // 跳转到主页面
        window.location.href = 'index.html';
      }, 800);
    }, 1200); // 1.2秒后进入主页面（更快）
  </script>
</body>
</html>
